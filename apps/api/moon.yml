tasks:
  dev:
    command: bun run dev
  build:
    command: bun build src/index.ts --outdir dist --target bun
    deps:
      - shared:build
    inputs:
      - src/**/*
      - package.json
      - tsconfig.json
      - drizzle.config.ts
    outputs:
      - dist
  typecheck:
    command: bun run typecheck
    deps:
      - shared:typecheck
    inputs:
      - src/**/*
      - package.json
      - tsconfig.json
      - drizzle.config.ts
