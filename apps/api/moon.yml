type: application
language: typescript

tasks:
  dev:
    command: bun run dev
    local: true
  build:
    command: bun build src/index.ts --outdir dist --target bun
    deps:
      - shared:build
    inputs:
      - src/**/*
      - package.json
      - tsconfig.json
      - drizzle.config.ts
      - ../../packages/shared/dist/**/*
    outputs:
      - dist
  typecheck:
    command: bun run typecheck
    deps:
      - shared:typecheck
    inputs:
      - src/**/*
      - package.json
      - tsconfig.json
      - drizzle.config.ts
